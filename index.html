<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gebara Engineering</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      overflow: hidden;
      height: 100%;
    }
    body {
      background: #475569;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
    }
    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    img {
      position: relative;
      z-index: 1;
      width: 300px;
      max-width: 80vw;
      filter: invert(1);
      mix-blend-mode: screen;
      transform-style: preserve-3d;
      transition: transform 0.1s ease-out;
      will-change: transform;
    }
    h1 {
      position: relative;
      z-index: 1;
      font-family: Helvetica, Arial, sans-serif;
      font-weight: 400;
      font-size: 1.5rem;
      color: #fff;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <img id="logo" src="1777167035987_image.png" alt="Gebara Engineering Logo" />
  <h1>Gebara Engineering</h1>
  <script>
    const logo = document.getElementById('logo');
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');

    const NUM_STARS = 600;
    const stars = Array.from({ length: NUM_STARS }, () => ({
      x: Math.random(),
      y: Math.random(),
      r: Math.random() * 1.5 + 0.3,
      twinkleOffset: Math.random() * Math.PI * 2,
      twinkleSpeed: 0.5 + Math.random() * 1.5,
    }));

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    let starsOpacity = 0;

    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (starsOpacity > 0) {
        const now = Date.now() / 1000;
        stars.forEach(s => {
          const twinkle = 0.5 + 0.5 * Math.sin(now * s.twinkleSpeed + s.twinkleOffset);
          const alpha = starsOpacity * twinkle;
          ctx.beginPath();
          ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${alpha})`;
          ctx.fill();
        });
      }
      requestAnimationFrame(drawStars);
    }
    drawStars();

    document.addEventListener('mousemove', (e) => {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;

      const nx = (e.clientX - cx) / cx;
      const ny = (e.clientY - cy) / cy;

      const rotateY = nx * 80;
      const rotateX = -ny * 80;
      logo.style.transform = `perspective(600px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

      // Distance from center (0 = center, 1 = edge)
      const dist = Math.min(Math.sqrt(nx * nx + ny * ny) / Math.SQRT2, 1);

      // Background: black at center, slate blue at edges
      const r = Math.round(71 * dist);
      const g = Math.round(85 * dist);
      const b = Math.round(105 * dist);
      document.body.style.background = `rgb(${r},${g},${b})`;

      // Stars: brightest at center, invisible at edges
      starsOpacity = 1 - dist;
    });

    document.addEventListener('mouseleave', () => {
      logo.style.transform = `perspective(600px) rotateX(0deg) rotateY(0deg)`;
      document.body.style.background = '#475569';
      starsOpacity = 0;
    });
  </script>
</body>
</html>
